<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giggle Kids Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

header{
background:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#ff4081;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
margin:8px 0;
}

button{
padding:10px;
border:none;
background:#ff4081;
color:white;
border-radius:5px;
cursor:pointer;
width:100%;
}

button:hover{
background:#e73370;
}

.qr{
text-align:center;
margin-top:20px;
}

#orderPage{display:none;}
</style>
</head>

<body>

<header>Giggle Kids 🎉</header>

<div class="container">

<!-- LOGIN PAGE -->
<div class="card" id="loginPage">
<h3>Login / Register</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<br><br>
<button onclick="register()">Register</button>
</div>

<!-- ORDER PAGE -->
<div id="orderPage">

<div class="card">
<h3>Select Product</h3>
<select id="product" onchange="updatePrice()">
<option value="899">Princess Dress - ₹899</option>
<option value="499">Superhero T-Shirt - ₹499</option>
<option value="699">Teddy Bear - ₹699</option>
</select>
<h3>Total: ₹<span id="price">899</span></h3>
</div>

<div class="card">
<h3>Delivery Address</h3>
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="pincode" placeholder="Pincode">
<input type="text" id="state" placeholder="State">
<input type="text" id="district" placeholder="District">
<input type="text" id="address" placeholder="Full Address">
<input type="text" id="landmark" placeholder="Landmark">
</div>

<div class="card">
<button onclick="generatePayment()">Proceed to Payment</button>

<div class="qr" id="qrSection" style="display:none;">
<h3>Scan & Pay</h3>
<img id="qrImage">
<p><strong>UPI ID:</strong> amzn0010168107@apl</p>
<br>
<a id="upiLink" target="_blank">
<button>Pay via GPay / PhonePe / Paytm</button>
</a>
<br><br>
<button onclick="confirmOrder()">Confirm Order</button>
</div>
</div>

<button onclick="logout()">Logout</button>

</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, addDoc, collection } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDW9lszTbWrv9tQyhZ54Z1YIFIewbXnVq0",
authDomain: "giggle-4a00f.firebaseapp.com",
projectId: "giggle-4a00f",
storageBucket: "giggle-4a00f.firebasestorage.app",
messagingSenderId: "351144017550",
appId: "1:351144017550:web:868227bc364385ecb753df",
measurementId: "G-MG2E0MJ2DM"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = function(){
const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;
signInWithEmailAndPassword(auth,email,pass)
.then(()=>alert("Login Success"))
.catch(err=>alert(err.message));
}

window.register = function(){
const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;
createUserWithEmailAndPassword(auth,email,pass)
.then(()=>alert("Account Created"))
.catch(err=>alert(err.message));
}

window.logout=function(){
signOut(auth);
}

onAuthStateChanged(auth,user=>{
if(user){
document.getElementById("loginPage").style.display="none";
document.getElementById("orderPage").style.display="block";
}else{
document.getElementById("loginPage").style.display="block";
document.getElementById("orderPage").style.display="none";
}
});

let currentPrice=899;
const upiID="amzn0010168107@apl";

window.updatePrice=function(){
currentPrice=document.getElementById("product").value;
document.getElementById("price").innerText=currentPrice;
}

window.generatePayment=function(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;

if(name==""||phone==""){
alert("Fill Name and Phone");
return;
}

const upiURL=`upi://pay?pa=${upiID}&pn=GiggleKids&am=${currentPrice}&cu=INR`;
document.getElementById("upiLink").href=upiURL;

const qrAPI=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiURL)}`;
document.getElementById("qrImage").src=qrAPI;
document.getElementById("qrSection").style.display="block";
}

window.confirmOrder=async function(){

await addDoc(collection(db,"orders"),{
product:document.getElementById("product").value,
price:currentPrice,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
pincode:document.getElementById("pincode").value,
state:document.getElementById("state").value,
district:document.getElementById("district").value,
address:document.getElementById("address").value,
landmark:document.getElementById("landmark").value,
date:new Date()
});

alert("Order Saved Successfully 🎉");
}

</script>

</body>
</html>
